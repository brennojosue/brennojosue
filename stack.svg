<svg width="800" height="160" viewBox="0 0 800 160" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="160" fill="#0d0d10"/>

  <!-- Subtle grid -->
  <line x1="400" y1="0" x2="400" y2="160" stroke="#1a1a22" stroke-width="0.5"/>

  <!-- Glow -->
  <ellipse cx="400" cy="80" rx="350" ry="60" fill="#7c5ecf" opacity="0.03"/>

  <!-- Section label -->
  <text x="400" y="30" font-family="'Courier New', monospace" font-size="11" fill="#7c5ecf" text-anchor="middle" letter-spacing="4">// stack</text>

  <!-- Top divider -->
  <line x1="60" y1="10" x2="740" y2="10" stroke="#1e1e2e" stroke-width="0.5"/>

  <!-- Cards: 7 items, evenly spaced -->
  <!-- TypeScript -->
  <rect x="40" y="42" width="90" height="88" rx="8" fill="#111118" stroke="#222230" stroke-width="0.5"/>
  <rect x="40" y="42" width="90" height="3" rx="2" fill="#3178c6" opacity="0.9"/>
  <text x="85" y="96" font-family="'Courier New', monospace" font-size="20" font-weight="700" fill="#3178c6" text-anchor="middle">TS</text>
  <text x="85" y="118" font-family="'Courier New', monospace" font-size="9" fill="#4a4a6a" text-anchor="middle" letter-spacing="1">TypeScript</text>

  <!-- Python -->
  <rect x="145" y="42" width="90" height="88" rx="8" fill="#111118" stroke="#222230" stroke-width="0.5"/>
  <rect x="145" y="42" width="90" height="3" rx="2" fill="#3776ab" opacity="0.9"/>
  <text x="190" y="96" font-family="'Courier New', monospace" font-size="20" font-weight="700" fill="#3776ab" text-anchor="middle">PY</text>
  <text x="190" y="118" font-family="'Courier New', monospace" font-size="9" fill="#4a4a6a" text-anchor="middle" letter-spacing="1">Python</text>

  <!-- C -->
  <rect x="250" y="42" width="90" height="88" rx="8" fill="#111118" stroke="#222230" stroke-width="0.5"/>
  <rect x="250" y="42" width="90" height="3" rx="2" fill="#a8b9cc" opacity="0.9"/>
  <text x="295" y="96" font-family="'Courier New', monospace" font-size="20" font-weight="700" fill="#a8b9cc" text-anchor="middle">C</text>
  <text x="295" y="118" font-family="'Courier New', monospace" font-size="9" fill="#4a4a6a" text-anchor="middle" letter-spacing="1">C Language</text>

  <!-- JavaScript -->
  <rect x="355" y="42" width="90" height="88" rx="8" fill="#111118" stroke="#222230" stroke-width="0.5"/>
  <rect x="355" y="42" width="90" height="3" rx="2" fill="#f7df1e" opacity="0.9"/>
  <text x="400" y="96" font-family="'Courier New', monospace" font-size="20" font-weight="700" fill="#d4be10" text-anchor="middle">JS</text>
  <text x="400" y="118" font-family="'Courier New', monospace" font-size="9" fill="#4a4a6a" text-anchor="middle" letter-spacing="1">JavaScript</text>

  <!-- HTML -->
  <rect x="460" y="42" width="90" height="88" rx="8" fill="#111118" stroke="#222230" stroke-width="0.5"/>
  <rect x="460" y="42" width="90" height="3" rx="2" fill="#e34c26" opacity="0.9"/>
  <text x="505" y="96" font-family="'Courier New', monospace" font-size="20" font-weight="700" fill="#e34c26" text-anchor="middle">H5</text>
  <text x="505" y="118" font-family="'Courier New', monospace" font-size="9" fill="#4a4a6a" text-anchor="middle" letter-spacing="1">HTML5</text>

  <!-- CSS -->
  <rect x="565" y="42" width="90" height="88" rx="8" fill="#111118" stroke="#222230" stroke-width="0.5"/>
  <rect x="565" y="42" width="90" height="3" rx="2" fill="#264de4" opacity="0.9"/>
  <text x="610" y="96" font-family="'Courier New', monospace" font-size="20" font-weight="700" fill="#4a6ef5" text-anchor="middle">CSS</text>
  <text x="610" y="118" font-family="'Courier New', monospace" font-size="9" fill="#4a4a6a" text-anchor="middle" letter-spacing="1">CSS3</text>

  <!-- Next.js -->
  <rect x="670" y="42" width="90" height="88" rx="8" fill="#111118" stroke="#222230" stroke-width="0.5"/>
  <rect x="670" y="42" width="90" height="3" rx="2" fill="#f0eeff" opacity="0.6"/>
  <text x="715" y="96" font-family="'Courier New', monospace" font-size="20" font-weight="700" fill="#d0c8f0" text-anchor="middle">N▲</text>
  <text x="715" y="118" font-family="'Courier New', monospace" font-size="9" fill="#4a4a6a" text-anchor="middle" letter-spacing="1">Next.js</text>

  <!-- Bottom divider -->
  <line x1="60" y1="150" x2="740" y2="150" stroke="#1e1e2e" stroke-width="0.5"/>
</svg>
