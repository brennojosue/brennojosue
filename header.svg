<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="200" fill="#0d0d10"/>

  <!-- Grid lines -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="#1a1a22" stroke-width="0.5"/>
  <line x1="400" y1="0" x2="400" y2="200" stroke="#1a1a22" stroke-width="0.5"/>

  <!-- Glow orbs -->
  <ellipse cx="700" cy="40" rx="240" ry="160" fill="#7c5ecf" opacity="0.08"/>
  <ellipse cx="100" cy="180" rx="160" ry="100" fill="#5de0c5" opacity="0.06"/>

  <!-- Label -->
  <text x="400" y="70" font-family="'Courier New', monospace" font-size="11" fill="#7c5ecf" text-anchor="middle" letter-spacing="4" opacity="0.9">// hello world</text>

  <!-- Name -->
  <text x="400" y="118" font-family="'Courier New', monospace" font-size="38" font-weight="700" fill="#f0eeff" text-anchor="middle" letter-spacing="-0.5">Olá, eu sou Brenno</text>

  <!-- Divider line -->
  <rect x="150" y="128" width="500" height="1" rx="1" fill="#3a2d6a" opacity="0.8"/>

  <!-- Subtitle pills -->
  <rect x="104" y="143" width="148" height="22" rx="11" fill="#14141e" stroke="#2e2650" stroke-width="0.5"/>
  <text x="178" y="159" font-family="'Courier New', monospace" font-size="10" fill="#7a7a9a" text-anchor="middle" letter-spacing="1">python developer</text>

  <rect x="262" y="143" width="88" height="22" rx="11" fill="#14141e" stroke="#2e2650" stroke-width="0.5"/>
  <text x="306" y="159" font-family="'Courier New', monospace" font-size="10" fill="#7a7a9a" text-anchor="middle" letter-spacing="1">Frontend</text>

  <rect x="360" y="143" width="58" height="22" rx="11" fill="#14141e" stroke="#2e2650" stroke-width="0.5"/>
  <text x="389" y="159" font-family="'Courier New', monospace" font-size="10" fill="#7a7a9a" text-anchor="middle" letter-spacing="1">web</text>

  <rect x="428" y="143" width="168" height="22" rx="11" fill="#14141e" stroke="#2e2650" stroke-width="0.5"/>
  <text x="512" y="159" font-family="'Courier New', monospace" font-size="10" fill="#7a7a9a" text-anchor="middle" letter-spacing="1">intelligent systems</text>

  <rect x="606" y="143" width="118" height="22" rx="11" fill="#14141e" stroke="#2e2650" stroke-width="0.5"/>
  <text x="665" y="159" font-family="'Courier New', monospace" font-size="10" fill="#7a7a9a" text-anchor="middle" letter-spacing="1">APIs | Bots</text>
  
</svg>
