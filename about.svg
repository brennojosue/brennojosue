<svg width="800" height="160" viewBox="0 0 800 160" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="160" fill="#0d0d10"/>

  <!-- Glow -->
  <ellipse cx="200" cy="80" rx="200" ry="80" fill="#5de0c5" opacity="0.03"/>

  <!-- Section label -->
  <text x="400" y="30" font-family="'Courier New', monospace" font-size="11" fill="#7c5ecf" text-anchor="middle" letter-spacing="4">// sobre</text>

  <!-- Terminal window -->
  <rect x="60" y="42" width="680" height="104" rx="8" fill="#0a0a12" stroke="#1e1e2e" stroke-width="0.5"/>

  <!-- Title bar -->
  <rect x="60" y="42" width="680" height="26" rx="8" fill="#111120"/>
  <rect x="60" y="56" width="680" height="12" fill="#111120"/>
  <circle cx="82" cy="55" r="5" fill="#e34c26" opacity="0.85"/>
  <circle cx="98" cy="55" r="5" fill="#d4be10" opacity="0.85"/>
  <circle cx="114" cy="55" r="5" fill="#3dd68c" opacity="0.85"/>
  <text x="400" y="60" font-family="'Courier New', monospace" font-size="10" fill="#3a3a5a" text-anchor="middle" letter-spacing="2">terminal — brenno@github</text>

  <!-- Separator -->
  <line x1="60" y1="68" x2="740" y2="68" stroke="#1a1a28" stroke-width="0.5"/>

  <!-- Content lines -->
  <text x="82" y="90" font-family="'Courier New', monospace" font-size="12" fill="#7c5ecf">$</text>
  <text x="96" y="90" font-family="'Courier New', monospace" font-size="12" fill="#5de0c5">whoami</text>

  <text x="82" y="110" font-family="'Courier New', monospace" font-size="11" fill="#6a6a8a">Desenvolvedor focado em frontend, com habilidades em sistemas inteligentes e interfaces web.</text>
  <text x="82" y="128" font-family="'Courier New', monospace" font-size="11" fill="#6a6a8a">Atenção a performance, clareza e código que dura.</text>

  <!-- Cursor -->
  <rect x="82" y="136" width="7" height="12" rx="1" fill="#5de0c5" opacity="0.75"/>
</svg>
